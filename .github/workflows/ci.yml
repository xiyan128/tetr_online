# The quality gate: formatting, lints, tests, docs, and every compile target
# that ships, on every push. `scripts/gate` runs the same steps in the same
# order locally — keep the two in lockstep when editing either.
#
# The deploy workflow (web.yml) only proves the wasm bundles BUILD; nothing else
# stops a regression from reaching master. This gate runs what a developer runs.
#
# The toolchain comes from rust-toolchain.toml (actions-rust-lang reads it), so
# CI compiles with the same pinned compiler as every local checkout — the same
# reproducibility contract the toml documents for the wasm bundles.
name: CI

on:
  push:
  workflow_dispatch:

# A newer push to the same ref supersedes the in-flight run; there is nothing
# a stale CI result can tell us.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reads rust-toolchain.toml for the channel + targets, and caches builds.
      - name: Install Rust (pinned toolchain)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      # Bevy's Linux build dependencies (audio + windowing), needed because the
      # workspace tests compile the full game crate.
      - name: Install Bevy system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libasound2-dev libudev-dev

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Tests (workspace)
        run: cargo test --workspace --locked

      # Broken intra-doc links are how comments rot silently after a rename or
      # a deletion; this turns them into failures.
      - name: Docs (broken links are errors)
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

      # The dev-tooling feature (egui inspector) is the one combination no other
      # job compiles; a check keeps it from rotting silently.
      - name: Check (dev feature)
        run: cargo check --features dev --locked

      # Bloom is an opt-in skin in NO default build (Kissaten is flat by
      # rule); without this check it would rot silently.
      - name: Check (bloom feature)
        run: cargo check --features bloom --locked

      # The embed's entire reason to exist is its wasm32 cdylib (hand-shipped to
      # the live blog embed), yet nothing compiled that target before this step.
      - name: Build (embed, wasm32)
        run: cargo build -p tetr-embed --target wasm32-unknown-unknown --locked

      # The game's SHIPPING target. A target-gated compile error here (the
      # winit-backend class of failure) would otherwise surface only in the
      # deploy workflow, after merge. A check is enough — the deploy still owns
      # the full bindgen/opt pipeline.
      - name: Check (game, wasm32, webgl2)
        run: >
          cargo check -p tetr_online --target wasm32-unknown-unknown
          --no-default-features --features webgl2 --locked
