# Build the dual WebGPU/WebGL2 wasm bundles and deploy them to GitHub Pages.
#
# Build mechanics follow the official Bevy CI template: plain `cargo build` for
# wasm32-unknown-unknown + `wasm-bindgen --target web`, with the CLI pinned to
# the exact `wasm-bindgen` version resolved in Cargo.lock to avoid CLI/runtime
# mismatch. All build logic lives in scripts/build.ts (run locally too).
name: Deploy web build to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; never cancel an in-flight production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reads rust-toolchain.toml (pinned channel + the wasm target), so the
      # deployed bundles are built by the SAME compiler the repo pins — the
      # reproducibility the toml documents. (The previous dtolnay@stable setup
      # exported RUSTUP_TOOLCHAIN=stable, silently overriding the pin.)
      - name: Install Rust (pinned toolchain + wasm target)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false # Swatinem/rust-cache below already owns caching

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # Pinned to a release tag: @main is a moving branch that runs code in
      # this job, and the deploy should not change behavior under our feet.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.20.0

      # Pin wasm-bindgen-cli to the Cargo.lock-resolved version. A version skew
      # between the CLI and the `wasm-bindgen` crate yields a silently broken
      # bundle (blank canvas, no error), so this match is load-bearing. binstall
      # fetches the prebuilt binary (seconds) instead of compiling from source.
      # --force: rust-cache restores binstall's install METADATA but not the
      # binary in ~/.cargo/bin, so on a warm cache an unforced binstall says
      # "already installed" and skips — leaving no wasm-bindgen on PATH.
      - name: Install wasm-bindgen-cli (pinned to Cargo.lock)
        run: |
          version="$(cargo metadata --format-version 1 --locked \
            | jq -r '.packages[] | select(.name == "wasm-bindgen") | .version' \
            | head -n1)"
          echo "Pinning wasm-bindgen-cli to ${version}"
          cargo binstall -y --force wasm-bindgen-cli --version "${version}"

      - name: Install binaryen (wasm-opt)
        run: |
          BINARYEN_VERSION=version_119
          curl -sSfL \
            "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar -xz
          echo "$PWD/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build web bundles
        run: bun run build

      # Wasm size is a budget this repo manages deliberately (the curated Bevy
      # feature list exists for it); make every deploy's number visible.
      - name: Bundle sizes (job summary)
        run: |
          {
            echo "### Deployed bundle sizes"
            echo ""
            echo "| file | size |"
            echo "|---|---|"
            for f in dist/*.wasm dist/*.js; do
              echo "| $(basename "$f") | $(du -h "$f" | cut -f1) |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # "Deploy succeeded" is not "site serves": fetch the page through the real
      # URL (custom domain + CDN) and require the app shell plus a wasm bundle.
      # Retries cover CDN propagation; failure here fails the run loudly.
      # -L matters: page_url is the github.io address, which 301s to the
      # custom domain; without following redirects the body is empty and the
      # check can never pass.
      - name: Verify the live site
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "verifying $url"
          for i in $(seq 1 6); do
            if page=$(curl -sfL "$url?cb=$(date +%s)") \
               && grep -q 'chunk-' <<< "$page" \
               && curl -sfLI "${url}tetr_online_webgl2_bg.wasm" >/dev/null; then
              echo "live site verified at $url"
              exit 0
            fi
            echo "not serving yet (attempt $i), retrying in 10s"
            sleep 10
          done
          echo "::error::deployed but the live site never served the new build"
          exit 1
